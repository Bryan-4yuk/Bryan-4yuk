<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none" role="img" aria-label="Bryan Joblek Obi Ayuk — Software Engineer, Web Developer and Designer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1410"/>
      <stop offset="0.55" stop-color="#0E1A14"/>
      <stop offset="1" stop-color="#0A0F0C"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8B339"/>
      <stop offset="1" stop-color="#F4D27A"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F4D27A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#F4D27A" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#F4D27A" stop-opacity="0"/>
    </linearGradient>
    <style>
      @keyframes drawline { from { stroke-dashoffset: 520; } to { stroke-dashoffset: 0; } }
      @keyframes fadeup { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes sweep { from { transform: translateX(-1200px); } to { transform: translateX(1200px); } }
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      @keyframes dotpulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }
      .rule { stroke: url(#gold); stroke-width: 2; stroke-dasharray: 520; animation: drawline 1.1s ease-out 0.2s both; }
      .name { animation: fadeup 0.8s ease-out 0.5s both; }
      .role { animation: fadeup 0.8s ease-out 0.75s both; }
      .meta { animation: fadeup 0.8s ease-out 1s both; }
      .sheen { animation: sweep 6s ease-in-out 1.6s infinite; }
      .cursor { animation: blink 1.1s step-end infinite; }
      .dot { animation: dotpulse 2.4s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .rule, .name, .role, .meta, .sheen, .cursor, .dot { animation: none; }
        .rule { stroke-dashoffset: 0; }
        .name, .role, .meta { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>

  <!-- faint grid texture -->
  <g stroke="#1C2A22" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- moving sheen -->
  <g class="sheen">
    <rect width="280" height="320" fill="url(#sheen)" transform="skewX(-18)"/>
  </g>

  <!-- left gold rule -->
  <line class="rule" x1="80" y1="118" x2="600" y2="118"/>

  <!-- eyebrow -->
  <text class="meta" x="80" y="104" fill="#8FA89A" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" letter-spacing="4">YAOUNDÉ, CAMEROON</text>

  <!-- name -->
  <text class="name" x="78" y="180" fill="#EDE6D6" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" letter-spacing="1">Bryan Ayuk</text>

  <!-- role line with cursor -->
  <text class="role" x="80" y="232" fill="#C9D6CC" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" letter-spacing="2">Software Engineer<tspan fill="#E8B339"> · </tspan>Full-Stack &amp; Web<tspan fill="#E8B339"> · </tspan>Designer<tspan class="cursor" fill="#E8B339" dx="6">_</tspan></text>

  <!-- availability pill -->
  <g class="meta">
    <circle class="dot" cx="92" cy="270" r="5" fill="#E8B339"/>
    <text x="106" y="275" fill="#8FA89A" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="1">Open to roles &amp; freelance</text>
  </g>

  <!-- right monogram mark -->
  <g opacity="0.92" class="name">
    <rect x="1010" y="96" width="116" height="116" rx="20" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <text x="1068" y="178" fill="#EDE6D6" text-anchor="middle" font-family="Georgia, serif" font-size="58" font-weight="700">BA</text>
  </g>
</svg>
